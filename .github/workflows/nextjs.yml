# Workflow for checking build compilation across the monorepo
#
# Runs pnpm build to ensure no compilation errors after commits
#
name: Build Check

on:
  # Runs on pull requests targeting the dev branch
  pull_request:
    branches: ["dev"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Basic permissions for checking out code and caching
permissions:
  contents: read

# Allow only one concurrent build check per PR
concurrency:
  group: build-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.13.0
          run_install: false
          
      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
            
      - name: Restore Next.js cache
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
            apps/web/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-
            
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
        
      - name: Generate Polkadot API descriptors
        run: pnpm papi
        
      - name: Build workspace (compilation check)
        run: pnpm build
        
