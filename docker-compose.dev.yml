version: '3.8'

services:
  chopsticks:
    build:
      context: ./packages/chopsticks
      dockerfile: Dockerfile
    command: >
      npx @acala-network/chopsticks xcm -p /configs/polkadot_asset_hub.yml -p /configs/hydration.yml
    healthcheck:
      test: >
        CMD-SHELL
        timeout 5 nc -z localhost 3421 &&
        timeout 5 nc -z localhost 3422
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    volumes:
      - ./packages/chopsticks/config:/configs
    ports:
      - "3421:3421"  # Asset Hub
      - "3422:3422"  # Hydration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3" 